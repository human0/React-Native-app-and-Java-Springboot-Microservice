name: Pull Request Validation

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Validate commit message format
      run: |
        COMMIT_MSG=$(git log --format=%B -n 1 ${{ github.event.after }})
        if ! [[ $COMMIT_MSG =~ ^(feature|fix|docs|refactor|test)(\(.+\))?: .+ ]]; then
          echo "Commit message does not follow conventional commit format"
          echo "Format: <type>[(jira#)]: <description>"
          echo "Types: feature, fix, docs, refactor, test, ci"
          echo "Example: feature(user-service): add user authentication"
          exit 1
        fi

    - name: Build and test
      run: |
        echo "Running build and tests for PR validation"
        # cd service-name && ./mvnw clean verify