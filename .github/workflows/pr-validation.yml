name: Pull Request Validation

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Validate commit message format
      run: |
        COMMIT_MSG=$(git log --format=%B -n 1 "$GITHUB_SHA")
        if ! [[ $COMMIT_MSG =~ ^(feature|fix|docs|refactor|test|ci)(\(.+\))?:\ .+ ]]; then
          echo "❌ WARNNING: Commit message does not follow conventional commit format:"
          echo "----------------------------------------------------------"
          echo "$COMMIT_MSG"
          echo "----------------------------------------------------------"
          echo "🛠️ Format should be: <type>[(ticket)]: <description>"
          echo "✔️ Example: feature(user-service): add user authentication"
          echo "Fix with git rebase -i HEAD~N"
        fi